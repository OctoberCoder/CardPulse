<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CardPulse{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f172a;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background-color:#1e293b;border-radius:12px;">
          <tr>
            <td style="padding:32px 32px 0;text-align:center;">
              <h1 style="color:#10b981;margin:0 0 8px;font-size:24px;">CardPulse</h1>
              <p style="color:#94a3b8;margin:0 0 24px;font-size:14px;">Gift Card Trading Platform</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 32px;color:#e2e8f0;font-size:15px;line-height:1.6;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px;border-top:1px solid #334155;text-align:center;">
              <p style="color:#64748b;font-size:12px;margin:0;">
                CardPulse &bull; Gift Card Trading Platform<br>
                <a href="https://cardpulse.publicvm.com" style="color:#10b981;">cardpulse.publicvm.com</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
